name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build smoke test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Typecheck (main + renderer)
        run: npm run typecheck

      - name: Adapter + peer-dependency smoke test
        run: npm run smoke

      - name: Build
        run: ./node_modules/.bin/electron-vite build

      - name: Package (--dir only, no DMG, fast)
        run: ./node_modules/.bin/electron-builder --mac --arm64 --dir
