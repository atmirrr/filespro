name: Release FilesPro

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    # Apple Silicon only for now. macos-13 (Intel) runners are deeply
    # backlogged on GitHub-hosted; revisit when we add x64 in a later version.
    name: Build (arm64)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Build renderer + main
        run: ./node_modules/.bin/electron-vite build

      - name: Package DMG (arm64)
        env:
          # Code signing is disabled for now (identity: null in package.json).
          # Once Apple Developer ID is set up, expose CSC_LINK + CSC_KEY_PASSWORD here.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./node_modules/.bin/electron-builder --mac --arm64

      - name: List artifacts
        run: ls -lh release/

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: filespro-arm64-dmg
          path: |
            release/*.dmg
            release/*.dmg.blockmap
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: filespro-arm64-dmg
          path: dist/arm64

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FilesPro ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/arm64/*.dmg
            dist/arm64/*.dmg.blockmap
