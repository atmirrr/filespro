<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>FilesPro</title>
    <meta
      name="description"
      content="A native Mac file manager for your local folders and 18 cloud storage providers. Free and open source."
    />
    <link rel="icon" type="image/png" href="./icon.png" />
    <meta property="og:title" content="FilesPro" />
    <meta
      property="og:description"
      content="Your S3, R2, GCS, Drive, Dropbox and 14 more, in one native Mac app."
    />
    <meta property="og:image" content="./icon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Helvetica Neue", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      html,
      body {
        height: 100%;
      }
      body {
        background: #ffffff;
        color: #1d1d1f;
      }
      .muted { color: #4a4a4d; }
      .quiet { color: #8a8a8e; }
      .btn-primary {
        background: #0a84ff;
        color: #ffffff;
        transition: background 120ms ease, transform 120ms ease;
      }
      .btn-primary:hover { background: #006ee6; }
      .btn-primary:active { transform: translateY(1px); }
      .btn-ghost {
        background: transparent;
        color: #1d1d1f;
        border: 1px solid #e1e1e3;
        transition: background 120ms ease, border-color 120ms ease;
      }
      .btn-ghost:hover { background: #f6f6f6; }

      /* -------- Orbit -------- */
      .orbit-stage {
        position: relative;
        width: 320px;
        height: 320px;
        margin: 0 auto;
      }
      @media (min-width: 640px) {
        .orbit-stage { width: 420px; height: 420px; }
      }
      .ring {
        position: absolute;
        left: 50%; top: 50%;
        border: 1px dashed rgba(0, 0, 0, 0.08);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }
      .ring-inner { width: 200px; height: 200px; }
      .ring-outer { width: 300px; height: 300px; }
      @media (min-width: 640px) {
        .ring-inner { width: 260px; height: 260px; }
        .ring-outer { width: 400px; height: 400px; }
      }

      .orbit-inner,
      .orbit-outer {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .orbit-inner { animation: orbit-spin 30s linear infinite; }
      .orbit-outer { animation: orbit-spin 48s linear infinite reverse; }

      .brand-icon {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 40px;
        height: 40px;
        margin: -20px 0 0 -20px;
        border-radius: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.18), 0 8px 24px -8px rgba(0, 0, 0, 0.12);
        color: #fff;
      }
      @media (min-width: 640px) {
        .brand-icon { width: 48px; height: 48px; margin: -24px 0 0 -24px; border-radius: 13px; }
      }

      .orbit-inner .brand-icon {
        transform: rotate(calc(var(--a) * 1deg)) translateY(-100px);
      }
      .orbit-outer .brand-icon {
        transform: rotate(calc(var(--a) * 1deg)) translateY(-150px);
      }
      @media (min-width: 640px) {
        .orbit-inner .brand-icon { transform: rotate(calc(var(--a) * 1deg)) translateY(-130px); }
        .orbit-outer .brand-icon { transform: rotate(calc(var(--a) * 1deg)) translateY(-200px); }
      }

      .center-icon {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 96px;
        height: 96px;
        border-radius: 22px;
        box-shadow: 0 24px 64px -18px rgba(10, 30, 69, 0.35);
        z-index: 10;
        background: #fff;
      }

      @keyframes orbit-spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }

      @media (prefers-reduced-motion: reduce) {
        .orbit-inner, .orbit-outer { animation: none; }
      }

      @media (prefers-color-scheme: dark) {
        body { background: #0f0f10; color: #f5f5f7; }
        .muted { color: #c3c3c7; }
        .quiet { color: #8a8a8e; }
        .btn-ghost { color: #f5f5f7; border-color: #2a2a2c; }
        .btn-ghost:hover { background: #1a1a1c; }
        .ring { border-color: rgba(255, 255, 255, 0.08); }
        .center-icon { background: #1a1a1c; }
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center px-6 py-16">
    <main class="text-center max-w-xl w-full">
      <!-- Orbit hero -->
      <div class="orbit-stage mb-8 sm:mb-10">
        <span class="ring ring-inner"></span>
        <span class="ring ring-outer"></span>

        <!-- Inner orbit: 6 most-recognized brands -->
        <div class="orbit-inner">
          <!-- Amazon S3 -->
          <span class="brand-icon" style="--a: 0; background: linear-gradient(135deg, #FF9900, #E67E00);">
            <svg width="26" height="26" viewBox="0 0 24 24">
              <path d="M5.2 5.5l6.8-2.4 6.8 2.4v3.2l-6.8 1.5L5.2 8.7V5.5z" fill="currentColor" opacity="0.55"/>
              <path d="M5.2 8.7l6.8 1.5 6.8-1.5V18l-6.8 2.5L5.2 18V8.7z" fill="currentColor"/>
            </svg>
          </span>

          <!-- Google Cloud Storage -->
          <span class="brand-icon" style="--a: 60; background: linear-gradient(135deg, #4285F4, #1A73E8);">
            <svg width="26" height="26" viewBox="0 0 24 24">
              <path d="M5.5 6h13l-1 13.5a1 1 0 0 1-1 .9H7.5a1 1 0 0 1-1-.9L5.5 6z" fill="#FFFFFF"/>
              <rect x="6.5" y="9.5" width="11" height="1.4" fill="#34A853"/>
              <rect x="6.7" y="11.8" width="10.6" height="1.4" fill="#FBBC04"/>
              <rect x="6.9" y="14.1" width="10.2" height="1.4" fill="#EA4335"/>
            </svg>
          </span>

          <!-- Google Drive -->
          <span class="brand-icon" style="--a: 120; background: #FFFFFF; border: 1px solid rgba(0,0,0,0.08);">
            <svg width="28" height="28" viewBox="0 0 24 24">
              <path d="M7.5 4L2 14l3 5 5.5-10L7.5 4z" fill="#0066DA"/>
              <path d="M16.5 4h-9l5.5 10h9L16.5 4z" fill="#FBBC04"/>
              <path d="M22 14l-3 5H10.5L13 14h9z" fill="#34A853"/>
              <path d="M10.5 19h9L22 14h-9l-2.5 5z" fill="#188038"/>
              <path d="M5 19h5.5L13 14H7.5L5 19z" fill="#1967D2"/>
              <path d="M16.5 4L13 14h9L16.5 4z" fill="#EA4335"/>
            </svg>
          </span>

          <!-- Dropbox -->
          <span class="brand-icon" style="--a: 180; background: linear-gradient(135deg, #0061FF, #0045B8);">
            <svg width="26" height="26" viewBox="0 0 24 24" style="color:#fff">
              <path d="M7 4L2.5 7.5 7 11l5-3.5L7 4z" fill="currentColor"/>
              <path d="M17 4L12 7.5 17 11l4.5-3.5L17 4z" fill="currentColor"/>
              <path d="M2.5 14.5L7 18l5-3.5L7 11l-4.5 3.5z" fill="currentColor"/>
              <path d="M17 11l-5 3.5L17 18l4.5-3.5L17 11z" fill="currentColor"/>
              <path d="M7 19l5 3.2L17 19l-5-3.5L7 19z" fill="currentColor"/>
            </svg>
          </span>

          <!-- Supabase -->
          <span class="brand-icon" style="--a: 240; background: linear-gradient(135deg, #3ECF8E, #2BA56B);">
            <svg width="28" height="28" viewBox="0 0 24 24">
              <path d="M13 2L4 13h7v9l9-11h-7V2z" fill="#FFFFFF"/>
            </svg>
          </span>

          <!-- Vercel Blob -->
          <span class="brand-icon" style="--a: 300; background: linear-gradient(135deg, #111111, #000000);">
            <svg width="26" height="26" viewBox="0 0 24 24">
              <path d="M12 3l10 18H2L12 3z" fill="#FFFFFF"/>
            </svg>
          </span>
        </div>

        <!-- Outer orbit: 8 more, counter-rotating -->
        <div class="orbit-outer">
          <!-- Cloudflare R2 -->
          <span class="brand-icon" style="--a: 22.5; background: linear-gradient(135deg, #F38020, #D45F12);">
            <svg width="26" height="26" viewBox="0 0 24 24" style="color:#fff">
              <path d="M19.4 14.4c.6-.2 1.1-.8 1.1-1.5 0-.9-.7-1.6-1.6-1.6h-.2c-.3-2.4-2.3-4.3-4.8-4.3-2.1 0-3.9 1.3-4.6 3.2-.5-.2-1-.3-1.5-.3-2.1 0-3.8 1.7-3.8 3.8 0 .3 0 .5.1.8h15.3z" fill="currentColor"/>
            </svg>
          </span>

          <!-- Azure -->
          <span class="brand-icon" style="--a: 67.5; background: linear-gradient(135deg, #0078D4, #005A9E);">
            <svg width="26" height="26" viewBox="0 0 24 24" style="color:#fff">
              <path d="M10.5 4.5h3l5.5 13.5h-4L13 13.5 8.5 18H4l6.5-13.5z" fill="currentColor"/>
              <path d="M8 18h6.5l-2-4L8 18z" fill="rgba(0,0,0,0.15)"/>
            </svg>
          </span>

          <!-- OneDrive -->
          <span class="brand-icon" style="--a: 112.5; background: linear-gradient(135deg, #0078D4, #005A9E);">
            <svg width="26" height="26" viewBox="0 0 24 24" style="color:#fff">
              <path d="M6.8 18.5c-2.3 0-4.1-1.8-4.1-4.1 0-2 1.5-3.7 3.4-4 .5-2.4 2.6-4.2 5.1-4.2 2 0 3.8 1.2 4.6 3a3.5 3.5 0 0 1 4.7 3.3c0 .6-.2 1.2-.4 1.7.7.4 1.2 1.2 1.2 2.1 0 1.3-1 2.3-2.3 2.3H6.8z" fill="currentColor"/>
            </svg>
          </span>

          <!-- Box -->
          <span class="brand-icon" style="--a: 157.5; background: linear-gradient(135deg, #0061D5, #003F8A);">
            <svg width="26" height="26" viewBox="0 0 24 24" style="color:#fff">
              <path d="M7 5h5a3.5 3.5 0 0 1 2.4 6.1A3.7 3.7 0 0 1 12.5 18H7V5zm2.4 2.2v3.4h2.4a1.7 1.7 0 1 0 0-3.4H9.4zm0 5.6v3h3.1a1.5 1.5 0 1 0 0-3H9.4z" fill="currentColor"/>
            </svg>
          </span>

          <!-- MinIO -->
          <span class="brand-icon" style="--a: 202.5; background: linear-gradient(135deg, #C72E29, #9B201C);">
            <svg width="26" height="26" viewBox="0 0 24 24" style="color:#fff">
              <path d="M5 19V5h2.5l4.5 8 4.5-8H19v14h-2.6V9.6L12 17.4 7.6 9.6V19H5z" fill="currentColor"/>
            </svg>
          </span>

          <!-- DigitalOcean Spaces -->
          <span class="brand-icon" style="--a: 247.5; background: linear-gradient(135deg, #0080FF, #0061BF);">
            <svg width="26" height="26" viewBox="0 0 24 24" style="color:#fff">
              <path d="M12 22c-5.5 0-10-4.5-10-10S6.5 2 12 2s10 4.5 10 10v3.4h-3.4V12c0-3.6-3-6.6-6.6-6.6S5.4 8.4 5.4 12 8.4 18.6 12 18.6V22z" fill="currentColor"/>
              <rect x="13" y="13" width="4" height="4" fill="currentColor"/>
            </svg>
          </span>

          <!-- Netlify Blobs -->
          <span class="brand-icon" style="--a: 292.5; background: linear-gradient(135deg, #00C7B7, #009E92);">
            <svg width="26" height="26" viewBox="0 0 24 24" style="color:#fff">
              <path d="M11 3L4 10v4l7 7h2l7-7v-4l-7-7h-2zm1 4l5 5-5 5-5-5 5-5z" fill="currentColor"/>
            </svg>
          </span>

          <!-- Storj -->
          <span class="brand-icon" style="--a: 337.5; background: linear-gradient(135deg, #2683FF, #1F69CC);">
            <svg width="26" height="26" viewBox="0 0 24 24" style="color:#fff">
              <path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z" fill="currentColor" opacity="0.5"/>
              <path d="M12 7l5 2.7v4.6L12 17l-5-2.7V9.7L12 7z" fill="currentColor"/>
            </svg>
          </span>
        </div>

        <!-- Center: app icon -->
        <img src="./icon.png" alt="" class="center-icon" />
      </div>

      <h1 class="text-5xl sm:text-6xl font-semibold tracking-tight">FilesPro</h1>

      <p class="mt-4 text-[17px] sm:text-[19px] leading-relaxed muted">
        Your S3, R2, GCS, Dropbox, Drive, and 14 more,
        <br class="hidden sm:block" />
        in one native Mac app.
      </p>

      <div class="mt-9 flex flex-col sm:flex-row items-center justify-center gap-3">
        <a
          href="https://github.com/atmirrr/filespro/releases/latest/download/FilesPro-0.1.0-arm64.dmg"
          class="btn-primary inline-flex items-center justify-center px-5 py-2.5 rounded-xl text-[14px] font-medium w-full sm:w-auto"
        >
          Download for Mac
        </a>
        <a
          href="https://github.com/atmirrr/filespro"
          class="btn-ghost inline-flex items-center justify-center px-5 py-2.5 rounded-xl text-[14px] font-medium w-full sm:w-auto"
        >
          View on GitHub
        </a>
      </div>

      <p class="mt-5 text-[12px] quiet">
        Apple Silicon, 121 MB. Free. Open source. MIT licensed.
      </p>
    </main>
  </body>
</html>
